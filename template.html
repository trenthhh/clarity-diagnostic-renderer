<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{DOCUMENT_TITLE}}</title>
    <style>
      {{FONT_FACE_CSS}}

      :root {
        --orange: {{COLOR_ORANGE}};
        --accent-blue: {{COLOR_ACCENT_BLUE}};
        --gray: {{COLOR_GRAY}};
        --gray-light: {{COLOR_GRAY_LIGHT}};
        --gray-border: {{COLOR_GRAY_BORDER}};
        --black: {{COLOR_BLACK}};
        --white: {{COLOR_WHITE}};
        --font-primary: {{FONT_PRIMARY}};
        --font-headline: {{FONT_HEADLINE}};
      }

      @page {
        size: Letter;
        margin: 0.75in 0.64in 1in 0.64in;
      }

      @page:first {
        margin: 0;
      }

      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        color: var(--black);
        background: var(--white);
        font-family: var(--font-primary);
        -webkit-font-smoothing: antialiased;
        text-rendering: geometricPrecision;
      }

      body {
        font-size: 16px;
        line-height: 1.55;
      }

      p { margin: 0 0 14px; }
      h1, h2, h3, h4 { margin: 0; }
      ul { margin: 8px 0 0 20px; padding: 0; }
      li { margin: 0 0 8px; }
      strong { font-weight: 600; }
      em { font-style: italic; }
      .document { width: 100%; }
      .page-break { break-before: page; }
      .page {
        position: relative;
        width: 100%;
        padding: 0;
      }
      .content-page {
      }
      .cover {
        height: 11in;
        padding-top: 0.72in;
        padding-right: 0.8in;
        overflow: hidden;
      }
      .cover-logo {
        width: {{COVER_LOGO_WIDTH}}px;
        height: auto;
      }
      .doc-kicker {
        margin-top: 44px;
        color: var(--gray);
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.22em;
        text-transform: uppercase;
      }
      .cover-rule {
        width: 108px;
        height: 2px;
        background: var(--orange);
        margin: 12px 0 34px;
      }
      .cover-headline {
        max-width: 78%;
        font-family: var(--font-headline);
        font-size: 54px;
        line-height: 1.04;
        font-weight: 700;
        letter-spacing: -0.03em;
        margin-bottom: 22px;
      }
      .cover-subhead {
        max-width: 66%;
        color: var(--gray);
        font-size: 22px;
        line-height: 1.42;
        margin-bottom: 26px;
      }
      .cover-practice {
        font-size: 18px;
        font-weight: 600;
        margin-bottom: 10px;
      }
      .cover-meta {
        color: var(--gray);
        font-size: 14px;
      }
      .cube-motif {
        position: absolute;
        right: 0.5in;
        top: 0.55in;
        width: 2.35in;
        opacity: 0.08;
      }
      .opener {
        font-size: 16px;
      }
      .body-copy h2, .finding-opening h2, .finding-why h2, .finding-do h2, .next-step-copy h2, .opener h2 {
        font-size: 17px;
        font-weight: 600;
        color: var(--black);
        margin: 22px 0 8px;
        letter-spacing: -0.01em;
      }
      .body-copy h3, .finding-opening h3, .finding-why h3, .finding-do h3, .next-step-copy h3, .opener h3 {
        font-size: 14px;
        font-weight: 600;
        color: var(--gray);
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin: 18px 0 6px;
      }
      .body-copy h4, .finding-opening h4, .finding-why h4, .finding-do h4, .next-step-copy h4, .opener h4 {
        font-size: 13px;
        font-weight: 600;
        color: var(--gray);
        margin: 14px 0 5px;
      }
      .section-header {
        font-size: 26px;
        line-height: 1.1;
        font-weight: 700;
        margin-bottom: 0;
        padding-bottom: 12px;
        border-bottom: 3px solid var(--orange);
        break-after: avoid;
        page-break-after: avoid;
      }
      .section-header + * {
        margin-top: 20px;
      }
      .section-rule {
        width: 100%;
        height: 1px;
        background: var(--gray-border);
        margin: 22px 0;
      }
      .summary-callout {
        margin-top: 0;
        background: var(--gray-light);
        border-left: 6px solid var(--orange);
        padding: 20px 24px;
      }
      .summary-callout p {
        font-size: 15.75px;
        line-height: 1.46;
        margin-bottom: 11px;
      }
      .summary-callout p:last-child { margin-bottom: 0; }
      .body-copy p,
      .finding-opening p,
      .finding-why p,
      .finding-do p,
      .next-step-copy p {
        font-size: 14px;
        line-height: 1.55;
        margin-bottom: 13px;
      }
      .finding {
        break-before: auto;
      }
      .finding-header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 18px;
      }
      .finding-badge {
        width: 28px;
        height: 28px;
        border-radius: 10px;
        background: var(--orange);
        color: var(--white);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 15px;
        font-weight: 700;
        flex: 0 0 auto;
      }
      .finding-title {
        font-size: 21px;
        line-height: 1.16;
        font-weight: 600;
      }
      .subsection-label {
        margin-top: 22px;
        margin-bottom: 9px;
        padding-top: 14px;
        border-top: 2px solid var(--orange);
        color: var(--black);
        font-size: 13px;
        line-height: 1.2;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .pull-quote {
        max-width: 80%;
        margin: 24px auto;
        padding-left: 16px;
        border-left: 4px solid var(--orange);
        font-size: 19px;
        line-height: 1.45;
        font-weight: 500;
        font-style: italic;
        color: var(--black);
        break-inside: avoid;
      }
      .stat-callout {
        margin: 24px 0;
        padding: 20px 24px;
        background: var(--gray-light);
        border-top: 3px solid var(--orange);
        text-align: center;
        break-inside: avoid;
      }
      .stat-callout-number {
        display: block;
        font-size: 48px;
        line-height: 1;
        font-weight: 700;
        color: var(--orange);
      }
      .stat-callout-label {
        display: block;
        margin-top: 4px;
        font-size: 13px;
        line-height: 1.35;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--gray);
      }
      .stat-callout-explanation {
        margin-top: 8px;
        font-size: 13px;
        line-height: 1.4;
        color: var(--gray);
      }
      .content-sidebar {
        margin: 20px 0;
        padding: 14px 18px;
        border: 1px solid var(--gray-border);
        border-left: 4px solid var(--orange);
        border-radius: 8px;
        font-size: 13px;
        line-height: 1.5;
        color: var(--gray);
        break-inside: avoid;
      }
      .graphic-panel {
        margin: 24px 0;
        padding: 18px 20px;
        background: var(--white);
        border: 1px solid var(--gray-border);
        border-radius: 8px;
        break-inside: avoid;
      }
      .graphic-caption {
        margin-top: 10px;
        font-size: 12px;
        line-height: 1.4;
        color: var(--gray);
        font-style: italic;
      }
      .ranking-rows {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .ranking-row {
        display: grid;
        grid-template-columns: 180px 1fr;
        gap: 14px;
        align-items: center;
      }
      .ranking-name {
        font-size: 13px;
        line-height: 1.3;
        font-weight: 600;
      }
      .ranking-bar-track {
        width: 100%;
      }
      .ranking-bar {
        min-height: 28px;
        padding: 5px 10px;
        border-radius: 999px;
        background: #D0D0D0;
        color: var(--black);
        display: inline-flex;
        align-items: center;
        justify-content: flex-end;
      }
      .ranking-bar.is-highlight {
        background: var(--orange);
        color: var(--white);
      }
      .ranking-value {
        font-size: 12px;
        font-weight: 700;
      }
      .comparison-stat-grid {
        display: flex;
        gap: 24px;
        justify-content: space-between;
      }
      .comparison-stat-item {
        flex: 1 1 0;
        text-align: center;
      }
      .comparison-stat-value {
        display: block;
        font-size: 42px;
        line-height: 1;
        font-weight: 700;
        color: var(--gray);
      }
      .comparison-stat-item.is-highlight .comparison-stat-value {
        color: var(--orange);
      }
      .comparison-stat-label,
      .single-big-stat-label {
        display: block;
        margin-top: 8px;
        font-size: 12px;
        line-height: 1.35;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--gray);
      }
      .single-big-stat {
        text-align: center;
      }
      .single-big-stat-value {
        display: block;
        font-size: 56px;
        line-height: 1;
        font-weight: 700;
        color: var(--orange);
      }
      .single-big-stat-context {
        margin-top: 8px;
        font-size: 13px;
        line-height: 1.4;
        color: var(--gray);
      }
      .maps-pack-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .maps-pack-row {
        display: grid;
        grid-template-columns: 22px 70px 1fr auto;
        gap: 10px;
        align-items: center;
        font-size: 13px;
        line-height: 1.4;
      }
      .maps-pack-pin {
        color: #2e9d59;
        font-weight: 700;
      }
      .maps-pack-missing .maps-pack-pin,
      .maps-pack-missing .maps-pack-position,
      .maps-pack-missing .maps-pack-name {
        color: var(--gray);
      }
      .maps-pack-position {
        font-weight: 600;
      }
      .maps-pack-value {
        font-weight: 700;
      }
      .effort-tag {
        margin-top: 14px;
        color: var(--gray);
        font-size: 13.5px;
        font-weight: 500;
      }
      .cards-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
        align-items: start;
      }
      .note-card {
        border: 1px solid var(--gray-border);
        border-radius: 12px;
        padding: 14px 14px 16px;
        break-inside: avoid;
      }
      .note-card p {
        font-size: 13.2px;
        line-height: 1.42;
        margin: 0;
      }
      .sequence-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 18px 22px;
      }
      .sequence-block {
        break-inside: avoid;
      }
      .sequence-title {
        color: var(--orange);
        font-size: 17px;
        line-height: 1.2;
        font-weight: 600;
        margin-bottom: 10px;
      }
      .next-step-page {
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }
      blockquote.cta-quote {
        margin: 24px 0 32px;
        padding: 8px 0 8px 22px;
        border-left: 2px solid var(--gray-border);
        color: var(--gray);
        font-style: italic;
      }
      .cta-button {
        display: inline-block;
        background: var(--accent-blue);
        color: var(--white);
        text-decoration: none;
        padding: 14px 22px;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 600;
        margin-top: 10px;
      }
      .signoff {
        font-size: 15px;
        line-height: 1.7;
        margin-top: 40px;
      }
      .signoff div { margin: 0; }
      .muted { color: var(--gray); }
      .empty-state {
        color: var(--gray);
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <div class="document">
      {{CONTENT}}
    </div>
  </body>
</html>
